<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#00d4ff;#4a00ff;#00d4ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.4">
        <animate attributeName="stop-color" values="#4a00ff;#00d4ff;#4a00ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.7">
        <animate attributeName="stop-color" values="#ffaa00;#ff6b00;#ffaa00" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#ffaa00" stop-opacity="0.3">
        <animate attributeName="stop-color" values="#ff6b00;#ffaa00;#ff6b00" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.6">
        <animate attributeName="stop-color" values="#00ff88;#00b894;#00ff88" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.2">
        <animate attributeName="stop-color" values="#00b894;#00ff88;#00b894" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="curveClip">
      <path d="M0,700 Q300,400 600,250 Q900,100 1200,300 L1200,700 Z"/>
    </clipPath>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid for high-tech feel -->
  <g opacity="0.1">
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#333" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="700" fill="url(#grid)"/>
  </g>
  
  <!-- Main abstract shapes representing effort -> love -> max results -->
  
  <!-- Central ascending geometric form (result peak) -->
  <g transform="translate(600,500)">
    <path d="M0,0 L-200,250 Q-100,150 0,200 Q100,150 200,250 Z" fill="url(#glow1)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="scale" values="1,0.9,1.1,1;1.1,1,1.2,1.05;1,0.95,1.05,1" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- Inner glow core -->
    <ellipse cx="0" cy="150" rx="60" ry="40" fill="url(#glow1)" opacity="0.6">
      <animate attributeName="ry" values="40;50;40" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Left side: Effort input (multiple converging paths) -->
  <g transform="translate(300,450)">
    <path d="M0,100 Q100,0 200,-50 Q250,-80 300,-60 L350,-20 Q380,20 400,60" fill="none" stroke="url(#glow2)" stroke-width="8" stroke-linecap="round" filter="url(#glow)">
      <animateMotion dur="15s" repeatCount="indefinite" path="M0,0 L-50,20 Q-100,0 -150,-30"/>
    </path>
    <path d="M0,150 Q120,80 240,30 Q280,10 340,50 L390,110 Q410,140 430,170" fill="none" stroke="url(#glow2)" stroke-width="6" stroke-linecap="round" opacity="0.8" filter="url(#glow)">
      <animateMotion dur="12s" repeatCount="indefinite" path="M0,0 L-40,10 Q-80,-10 -120,-40"/>
    </path>
    <path d="M0,200 Q80,160 160,120 Q200,100 260,130 L310,190 Q330,220 350,240" fill="none" stroke="url(#glow2)" stroke-width="10" stroke-linecap="round" opacity="0.7" filter="url(#glow)">
      <animateMotion dur="18s" repeatCount="indefinite" path="M0,0 L-60,30 Q-120,10 -180,-20"/>
    </path>
  </g>
  
  <!-- Right side: Radiating results (expanding geometric waves) -->
  <g transform="translate(900,400)">
    <circle cx="0" cy="0" r="30" fill="url(#glow3)" filter="url(#glow)">
      <animate attributeName="r" values="30;45;30" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="url(#glow3)" opacity="0.5" filter="url(#glow)">
      <animate attributeName="r" values="60;75;60" dur="5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="0" cy="0" r="90" fill="url(#glow3)" opacity="0.3" filter="url(#glow)">
      <animate attributeName="r" values="90;105;90" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <!-- Connecting energy lines -->
    <path d="M0,0 L150,50 L250,20 L350,-30" fill="none" stroke="url(#glow3)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite" path="M0,0 Q100,-50 200,-100"/>
    </path>
    <path d="M0,0 L120,-80 L220,-120 L320,-90" fill="none" stroke="url(#glow3)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" filter="url(#glow)">
      <animateMotion dur="7s" repeatCount="indefinite" path="M0,0 Q80,20 160,0"/>
    </path>
  </g>
  
  <!-- Interconnecting futuristic arcs (love/passion bridge) -->
  <g opacity="0.9">
    <path d="M400,300 Q500,200 700,320 Q850,400 950,350" fill="none" stroke="url(#glow1)" stroke-width="12" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-width" values="12;16;12" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M420,280 Q520,220 680,300 Q830,380 930,330" fill="none" stroke="url(#glow2)" stroke-width="8" stroke-linecap="round" opacity="0.7" filter="url(#glow)">
      <animate attributeName="stroke-width" values="8;12;8" dur="11s" repeatCount="indefinite" begin="2s"/>
    </path>
  </g>
  
  <!-- Floating geometric particles for high-tech atmosphere -->
  <g opacity="0.6">
    <circle cx="150" cy="150" r="8" fill="#00d4ff" filter="url(#glow)">
      <animate attributeName="cy" values="150;100;150" dur="20s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 150 150;360 150 150" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="250" r="6" fill="#ffaa00" filter="url(#glow)">
      <animate attributeName="cx" values="1050;1100;1050" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="500" r="10" fill="#00ff88" filter="url(#glow)">
      <animate attributeName="r" values="10;15;10" dur="14s" repeatCount="indefinite"/>
    </circle>
    <rect x="50" y="550" width="15" height="15" rx="3" fill="#4a00ff" opacity="0.8" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0;20,-20;0,0" dur="16s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Subtle bottom glow for depth -->
  <ellipse cx="600" cy="680" rx="400" ry="80" fill="url(#glow3)" opacity="0.2" filter="url(#glow)"/>
  
</svg>