<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d42;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="deepGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGradient)"/>
  
  <!-- Central Core Circle -->
  <circle cx="600" cy="350" r="80" fill="none" stroke="url(#glowGradient1)" stroke-width="3" opacity="0.6" filter="url(#deepGlow)"/>
  <circle cx="600" cy="350" r="70" fill="none" stroke="url(#glowGradient1)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Inner Pulsing Core -->
  <circle cx="600" cy="350" r="40" fill="url(#glowGradient1)" opacity="0.3" filter="url(#glow)"/>
  <circle cx="600" cy="350" r="30" fill="none" stroke="url(#glowGradient1)" stroke-width="2" opacity="0.8"/>
  
  <!-- Radiating Action Lines - Top -->
  <line x1="600" y1="350" x2="600" y2="80" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <polygon points="600,80 595,100 605,100" fill="url(#glowGradient2)" opacity="0.7"/>
  
  <!-- Radiating Action Lines - Bottom -->
  <line x1="600" y1="350" x2="600" y2="620" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <polygon points="600,620 595,600 605,600" fill="url(#glowGradient2)" opacity="0.7"/>
  
  <!-- Radiating Action Lines - Left -->
  <line x1="600" y1="350" x2="150" y2="350" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <polygon points="150,350 170,345 170,355" fill="url(#glowGradient2)" opacity="0.7"/>
  
  <!-- Radiating Action Lines - Right -->
  <line x1="600" y1="350" x2="1050" y2="350" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <polygon points="1050,350 1030,345 1030,355" fill="url(#glowGradient2)" opacity="0.7"/>
  
  <!-- Diagonal Action Lines -->
  <line x1="600" y1="350" x2="850" y2="150" stroke="url(#glowGradient1)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <polygon points="850,150 835,160 842,148" fill="url(#glowGradient1)" opacity="0.6"/>
  
  <line x1="600" y1="350" x2="350" y2="150" stroke="url(#glowGradient1)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <polygon points="350,150 358,148 365,160" fill="url(#glowGradient1)" opacity="0.6"/>
  
  <line x1="600" y1="350" x2="850" y2="550" stroke="url(#glowGradient1)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <polygon points="850,550 842,552 835,540" fill="url(#glowGradient1)" opacity="0.6"/>
  
  <line x1="600" y1="350" x2="350" y2="550" stroke="url(#glowGradient1)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <polygon points="350,550 365,540 358,552" fill="url(#glowGradient1)" opacity="0.6"/>
  
  <!-- Orbital Geometric Shapes - Top Right -->
  <rect x="820" y="120" width="50" height="50" fill="none" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.6" transform="rotate(45 845 145)" filter="url(#glow)"/>
  
  <!-- Orbital Geometric Shapes - Bottom Left -->
  <circle cx="280" cy="560" r="30" fill="none" stroke="url(#glowGradient1)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Orbital Geometric Shapes - Top Left -->
  <polygon points="320,140 340,100 360,140 340,180" fill="none" stroke="url(#glowGradient2)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Orbital Geometric Shapes - Bottom Right -->
  <rect x="920" y="560" width="40" height="40" fill="none" stroke="url(#glowGradient1)" stroke-width="2" opacity="0.5" transform="rotate(20 940 580)" filter="url(#glow)"/>
  
  <!-- Connecting Nodes - Top -->
  <circle cx="600" cy="120" r="6" fill="url(#glowGradient2)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Connecting Nodes - Bottom -->
  <circle cx="600" cy="580" r="6" fill="url(#glowGradient2)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Connecting Nodes - Left -->
  <circle cx="180" cy="350" r="6" fill="url(#glowGradient2)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Connecting Nodes - Right -->
  <circle cx="1020" cy="350" r="6" fill="url(#glowGradient2)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Central Action Indicator Hexagon -->
  <g opacity="0.7" filter="url(#glow)">
    <polygon points="600,300 635,325 635,375 600,400 565,375 565,325" fill="none" stroke="url(#glowGradient1)" stroke-width="2"/>
  </g>
  
  <!-- Secondary Orbiting Elements -->
  <circle cx="750" cy="280" r="4" fill="url(#glowGradient2)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="450" cy="420" r="4" fill="url(#glowGradient2)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="750" cy="420" r="4" fill="url(#glowGradient1)" opacity="0.5" filter="url(#glow)"/>
  <circle cx="450" cy="280" r="4" fill="url(#glowGradient1)" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Subtle Background Grid Lines -->
  <line x1="0" y1="175" x2="1200" y2="175" stroke="url(#glowGradient1)" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="url(#glowGradient1)" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="700" stroke="url(#glowGradient2)" stroke-width="0.5" opacity="0.1"/>
  <line x1="900" y1="0" x2="900" y2="700" stroke="url(#glowGradient2)" stroke-width="0.5" opacity="0.1"/>
</svg>