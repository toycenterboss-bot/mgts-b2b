      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+7-495-636-0-636",
        "contactType": "customer service"
      }
    }
    </script>    <!-- Компоненты должны загружаться первыми -->
    <script src="/js/api-client.js"></script>
    <script src="/js/navigation-renderer.js"></script>
    <script src="/js/footer-renderer.js"></script>
    <script src="/js/components-loader.js"></script>
        <script src="/js/cms-processors.js"></script>
    <script src="/js/cms-loader.js"></script>

        <!-- Компоненты должны загружаться первыми -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/home-page-normalize.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>
<body data-page="main">
    <!-- Skip Links для доступности -->
    <a href="#main-content" class="skip-link">Перейти к основному контенту</a>
    <a href="#mainNav" class="skip-link">Перейти к навигации</a>
    
    <!-- Header -->
    <header>

        <div data-component="header"></div>

    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Цифровые решения для вашего бизнеса</h1>
                <p>Интернет, телефония, облачные сервисы и безопасность. Комплексные решения от МГТС для развития вашего бизнеса.</p>
                <div class="hero-actions">
                    <a href="#consultation" class="btn btn-primary btn-lg">Получить консультацию</a>
                    <a href="#calculator" class="btn btn-outline btn-lg">Рассчитать стоимость</a>
                </div>
            </div>
        </div>
        <!-- Визуальный индикатор прокрутки -->
        <a href="#main-content" class="hero-scroll-indicator" aria-label="Прокрутить вниз">
            <span class="hero-scroll-indicator-text">Прокрутить</span>
            <div class="hero-scroll-indicator-icon" aria-hidden="true"></div>
        </a>
    </section>

    <!-- Контент будет загружен из CMS -->
    <main id="main-content">
        <section class="section">
            <div class="container">
                <!-- Контент из CMS будет вставлен сюда -->
            </div>
        </section>
    </main>

<footer>


    <div data-component="footer"></div>


</footer>

    <!-- Компоненты должны загружаться первыми -->
    <!-- Основные скрипты -->
    <script src="/js/main.js"></script>
    <script src="/js/seasonal.js"></script>
    <script src="/js/icons-replace.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/mirror-slider.js"></script>
    <script src="/js/history-timeline.js"></script>
    <script src="/js/section-map.js"></script>
    <script src="/js/mobile-app-section.js"></script>
    <script src="/js/crm-cards.js"></script>
    <script src="/js/services-selector.js"></script>
    <script src="/js/partnership-slider.js"></script>
    <!-- Дополнительная инициализация после загрузки всех скриптов -->
    <script>
        // Убеждаемся, что компоненты загружены после всех скриптов
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (typeof ComponentLoader !== 'undefined' && typeof ComponentLoader.init === 'function') {
                    // Повторная инициализация на случай, если первая не сработала
                    const header = document.querySelector('[data-component="header"]');
                    const footer = document.querySelector('[data-component="footer"]');
                    
                    if (header && header.innerHTML.trim() === '') {
                        console.log('Retrying header load...');
                        ComponentLoader.load('header', '[data-component="header"]');
                    }
                    
                    if (footer && footer.innerHTML.trim() === '') {
                        console.log('Retrying footer load...');
                        ComponentLoader.load('footer', '[data-component="footer"]');
                    }
                }
                
                // Принудительная инициализация partnership slider после полной загрузки
                if (typeof window.initPartnershipSlider === 'function') {
                    setTimeout(function() {
                        window.initPartnershipSlider();
                    }, 1000);
                }
            }, 500);
        });
    </script>
</body>
</html>
