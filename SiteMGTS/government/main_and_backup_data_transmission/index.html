<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>
<body>
    <!-- Header -->
    <div data-component="header"></div>

    <!-- Loading indicator -->
    <div id="loading-indicator" style="display: none; text-align: center; padding: 40px;">
        <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid var(--color-primary, #0066cc); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p style="margin-top: 20px; color: var(--color-gray-600, #666);">Загрузка контента...</p>
    </div>

    <!-- Error message -->
    <div id="error-message" style="display: none; padding: 40px; text-align: center; background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; margin: 20px; color: #856404;">
        <h2>Ошибка загрузки контента</h2>
        <p>Не удалось загрузить контент из CMS. Пожалуйста, обновите страницу или обратитесь к администратору.</p>
        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 20px;">Обновить страницу</button>
    </div>

    <!-- Main content -->
    <main id="main-content" style="min-height: 400px;">
        <!-- Контент будет загружен динамически из API -->
    </main>

    <!-- Footer -->
    <div data-component="footer"></div>

    <!-- Sidebar placeholder (будет загружен если нужно) -->
    <div data-component="sidebar-about"></div>

    <!-- Scripts -->
    
    <script src="/js/main.js"></script>    <!-- Компоненты должны загружаться первыми -->
    <script src="/js/seasonal.js"></script>    <!-- Компоненты должны загружаться первыми -->
    <script src="/js/api-client.js"></script>
    <script src="/js/navigation-renderer.js"></script>
    <script src="/js/footer-renderer.js"></script>
    <script src="/js/components-loader.js"></script>
    <script src="/js/cms-processors.js"></script>
    <script src="/js/cms-loader.js"></script>
    
    <!-- Инициализация специальных компонентов -->
    <script src="/js/mirror-slider.js"></script>
    <script src="/js/history-timeline.js"></script>
    <script src="/js/section-map.js"></script>
    <script src="/js/mobile-app-section.js"></script>
    <script src="/js/crm-cards.js"></script>

    <script src="/js/icons-replace.js"></script>
    <script src="/js/animations.js"></script>

    <script>
        // Стили для спиннера
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        // Определение slug из URL
        function getSlugFromURL() {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p && p !== 'index.html' && p !== 'page-template.html');
            return parts.join('/') || 'index';
        }

        // Загрузка страницы из API
        async function loadPage() {
            const loadingIndicator = document.getElementById('loading-indicator');
            const errorMessage = document.getElementById('error-message');
            const mainContent = document.getElementById('main-content');
            
            loadingIndicator.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                const slug = getSlugFromURL();
                console.log(`Loading page with slug: ${slug}`);

                if (!window.StrapiAPI) {
                    throw new Error('StrapiAPI not available');
                }

                const page = await window.StrapiAPI.getPage(slug) || 
                            await window.StrapiAPI.getPageBySlug(slug);

                if (!page || !page.data) {
                    throw new Error('Page not found');
                }

                const pageData = page.data || page;

                // Обновить метаданные
                if (pageData.title) {
                    document.title = pageData.title;
                }

                if (pageData.metaDescription) {
                    let metaDesc = document.querySelector('meta[name="description"]');
                    if (!metaDesc) {
                        metaDesc = document.createElement('meta');
                        metaDesc.name = 'description';
                        document.head.appendChild(metaDesc);
                    }
                    metaDesc.content = pageData.metaDescription;
                }

                // Рендерить Hero
                if (pageData.heroTitle || pageData.heroSubtitle) {
                    const heroSection = document.createElement('section');
                    heroSection.className = 'hero';
                    heroSection.innerHTML = `
                        <div class="container">
                            <div class="hero-content">
                                ${pageData.heroTitle ? `<h1>${pageData.heroTitle}</h1>` : ''}
                                ${pageData.heroSubtitle ? `<p>${pageData.heroSubtitle}</p>` : ''}
                            </div>
                        </div>
                    `;
                    mainContent.insertBefore(heroSection, mainContent.firstChild);
                }

                // Рендерить контент
                if (pageData.content) {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = pageData.content;
                    mainContent.appendChild(contentDiv);
                }

                // Рендерить breadcrumbs
                if (pageData.breadcrumbs) {
                    let breadcrumbs;
                    try {
                        breadcrumbs = typeof pageData.breadcrumbs === 'string' 
                            ? JSON.parse(pageData.breadcrumbs) 
                            : pageData.breadcrumbs;
                    } catch (e) {
                        console.warn('Invalid breadcrumbs data');
                    }

                    if (Array.isArray(breadcrumbs) && breadcrumbs.length > 0) {
                        const breadcrumbsNav = document.createElement('nav');
                        breadcrumbsNav.className = 'breadcrumbs';
                        breadcrumbsNav.innerHTML = breadcrumbs.map((item, index) => {
                            const isLast = index === breadcrumbs.length - 1;
                            return isLast
                                ? `<span class="breadcrumbs-item">${item.name}</span>`
                                : `<a href="${item.url || '#'}" class="breadcrumbs-item">${item.name}</a>`;
                        }).join(' / ');
                        mainContent.insertBefore(breadcrumbsNav, mainContent.firstChild);
                    }
                }

                // Загрузить sidebar если нужно
                if (pageData.sidebar === 'about' && window.ComponentLoader) {
                    window.ComponentLoader.load('sidebar-about', '[data-component="sidebar-about"]');
                }

                loadingIndicator.style.display = 'none';
                console.log('Page loaded successfully');

            } catch (error) {
                console.error('Error loading page:', error);
                loadingIndicator.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        }

        // Запуск загрузки после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPage);
        } else {
            loadPage();
        }
    </script>
</body>
</html>
