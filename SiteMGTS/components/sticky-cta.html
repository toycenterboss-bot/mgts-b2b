<!-- Sticky CTA для страниц услуг -->
<div class="sticky-cta" id="sticky-cta" aria-label="Быстрое действие">
    <div class="sticky-cta__container">
        <div class="sticky-cta__content">
            <div class="sticky-cta__text">
                <span class="sticky-cta__title">Готовы начать?</span>
                <span class="sticky-cta__subtitle">Получите консультацию или закажите услугу</span>
            </div>
            <div class="sticky-cta__actions">
                <a href="#service-order" class="btn btn-primary btn-lg sticky-cta__btn">
                    Заказать услугу
                </a>
                <button class="sticky-cta__close" aria-label="Закрыть" id="sticky-cta-close">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
