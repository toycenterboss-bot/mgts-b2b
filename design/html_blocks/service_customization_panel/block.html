<section class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100" data-stitch-block="service_customization_panel">

<span class="material-symbols-outlined text-slate-400" data-dropdown-icon>unfold_more</span>
</button>
<div class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-lg shadow-xl overflow-hidden z-20 hidden" data-dropdown-menu>
<div class="p-2 border-b border-slate-100 dark:border-border-dark">
<div class="flex items-center px-2 py-1.5 bg-slate-50 dark:bg-background-dark rounded-md">
<span class="material-symbols-outlined text-lg text-slate-400 mr-2">search</span>
<input class="bg-transparent border-none text-xs focus:ring-0 p-0 w-full" placeholder="Поиск..." type="text" data-dropdown-search/>
</div>
</div>
<ul class="max-h-48 overflow-y-auto custom-scrollbar">

<li><button class="w-full text-left px-4 py-2 text-sm hover:bg-primary hover:text-white cursor-pointer transition-colors" type="button" data-dropdown-option data-value="vdsl" data-label="Медная линия (VDSL)">Медная линия (VDSL)</button></li>
<li><button class="w-full text-left px-4 py-2 text-sm hover:bg-primary hover:text-white cursor-pointer transition-colors" type="button" data-dropdown-option data-value="sat" data-label="Спутниковая связь">Спутниковая связь</button></li>
</ul>
</div>
</div>
</div>

<label class="text-xs font-bold uppercase tracking-wider text-slate-500">Дополнительные опции</label>

<span class="absolute left-1 top-1 size-3 bg-white rounded-full" data-switch-thumb></span>

</div>
</div>

<button class="w-full py-3 border-2 border-primary text-primary font-bold rounded-lg hover:bg-primary hover:text-white transition-all text-sm">
